name: CI — Lint & Test

on:
  push:
    branches:
      - main
      - "copilot/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    # Use self-hosted runner; fall back to ubuntu-latest when unavailable
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # TOR_API_KEY is NOT needed for unit tests; guard prevents real connection
          TOR_API_KEY: ${{ secrets.TOR_API_KEY }}
