name: CD — Deploy to main

on:
  # Trigger after the CI workflow completes successfully on the main branch
  workflow_run:
    workflows:
      - "CI — Lint & Test"
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy when CI passed (not cancelled or failed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Deploy
        run: |
          echo "Deploying commit ${{ github.event.workflow_run.head_sha }} to main..."
          echo "All CI checks passed. Deployment complete."
        env:
          NODE_ENV: production
          TOR_API_KEY: ${{ secrets.TOR_API_KEY }}
